name: Draft release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  create-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Package release files
        id: package
        shell: bash
        run: |
          set -euo pipefail

          asset_tag="${GITHUB_REF_NAME//\//-}"
          extension_asset="chatgpt-http-error-431-fixer-extension-${asset_tag}.zip"
          userscript_asset="chatgpt-http-error-431-fixer.user.js"

          mkdir release
          git archive \
            --format=zip \
            --add-file=LICENSE \
            --output="release/$extension_asset" \
            "${GITHUB_SHA}:extension"
          cp userscript/chatgpt-http-error-431-fixer.user.js \
            "release/$userscript_asset"

          echo "extension_asset=$extension_asset" >> "$GITHUB_OUTPUT"
          echo "userscript_asset=$userscript_asset" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          EXTENSION_ASSET: ${{ steps.package.outputs.extension_asset }}
          USERSCRIPT_ASSET: ${{ steps.package.outputs.userscript_asset }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/$EXTENSION_ASSET" \
            "release/$USERSCRIPT_ASSET" \
            --draft \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            --verify-tag
